<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/Admin_Settings.css" />
    <link rel="icon" type="jpeg" href="https://github.com/prbhleeen/intern.nation/blob/main/assets/logo.jpeg?raw=true">
    <style>
        /* Optional: smooth transition when switching themes */
        * {
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
    </style>
</head>

<body>
    <header>
        <img src="https://github.com/prbhleeen/intern.nation/blob/main/assets/logo.jpeg?raw=true" alt="Logo" />
        <h1>Admin Settings</h1>
    </header>

    
    <!-- ===== MAIN LAYOUT ===== -->
  <div class="dashboard-container">
    <aside class="sidebar">
      <ul>
        <li><a href="Admin_Dashboard.html">🏠 Dashboard</a></li>
        <li><a href="Admin_Statistics.html">📊 View All Statistics</a></li>
        <li><a href="Admin_ManageUsers.html">👥 Manage Users</a></li>
        <li><a href="Admin_ManageCompanies.html">🏢 Manage Companies</a></li>
        <li><a href="Admin_ViewSchedules.html" class="active-link">📅 View Schedules</a></li>
        <li><a href="Admin_Settings.html">⚙ System Settings</a></li>
      </ul>
    </aside>

        <main class="main-content">
            <h2>Settings</h2>

            <form id="settingsForm">
                <div class="card">
                    <h3>General</h3>
                    <div class="form-group">
                        <label for="site-name">Site Name</label>
                        <input type="text" id="site-name" name="site_name" value="intern.nation" />
                    </div>
                    <div class="form-group">
                        <label for="admin-email">Admin Email</label>
                        <input type="email" id="admin-email" name="admin_email" value="Shipra@example.com" />
                    </div>
                </div>

                <div class="card">
                    <h3>Security</h3>
                    <div class="form-group">
                        <label for="two-factor">Two-Factor Authentication</label>
                        <div class="switch-container">
                            <label class="switch">
                                <input type="checkbox" id="two-factor" name="two_factor" checked />
                                <span class="slider"></span>
                            </label>
                            <span>Enabled</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Notifications</h3>
                    <div class="form-group">
                        <label for="notification-email">Notification Email</label>
                        <input type="email" id="notification-email" name="notification_email"
                            value="notifications@example.com" />
                    </div>
                    <div class="form-group">
                        <label for="receive-updates">Receive Updates</label>
                        <div class="switch-container">
                            <label class="switch">
                                <input type="checkbox" id="receive-updates" name="receive_updates" checked />
                                <span class="slider"></span>
                            </label>
                            <span>Enabled</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Appearance</h3>
                    <div class="form-group">
                        <label for="dark-mode">Dark / Light Mode</label>
                        <div class="switch-container">
                            <label class="switch">
                                <input type="checkbox" id="dark-mode" name="dark_mode" />
                                <span class="slider"></span>
                            </label>
                            <span id="mode-label">Light Mode</span>
                        </div>
                    </div>
                </div>

                <div class="buttons">
                    <button type="submit" class="save">Save Changes</button>
                    <button type="reset" class="cancel">Cancel</button>
                </div>
            </form>
        </main>
    </div>

    <footer>
        © 2025 Admin Dashboard. All Rights Reserved.
    </footer>

    <script>

        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("settingsForm");
            const darkModeSwitch = document.getElementById("dark-mode");
            const modeLabel = document.getElementById("mode-label");

            // ✅ Load saved theme
            const savedTheme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-theme", savedTheme);
            darkModeSwitch.checked = savedTheme === "dark";
            modeLabel.textContent = savedTheme === "dark" ? "Dark Mode" : "Light Mode";

            darkModeSwitch.addEventListener("change", () => {
                const theme = darkModeSwitch.checked ? "dark" : "light";
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("theme", theme);
                modeLabel.textContent = theme === "dark" ? "Dark Mode" : "Light Mode";
            });

            // ✅ Fetch settings from backend
            try {
                const response = await fetch("http://localhost:5000/api/settings");
                const settings = await response.json();

                document.getElementById("site-name").value = settings.site_name;
                document.getElementById("admin-email").value = settings.admin_email;
                document.getElementById("notification-email").value = settings.notification_email;
                document.getElementById("two-factor").checked = settings.two_factor;
                document.getElementById("receive-updates").checked = settings.receive_updates;
                darkModeSwitch.checked = settings.dark_mode;
                modeLabel.textContent = settings.dark_mode ? "Dark Mode" : "Light Mode";
            } catch (error) {
                console.error("Error loading settings:", error);
            }

            // ✅ Save settings (PUT request)
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const updatedSettings = {
                    site_name: document.getElementById("site-name").value,
                    admin_email: document.getElementById("admin-email").value,
                    two_factor: document.getElementById("two-factor").checked,
                    notification_email: document.getElementById("notification-email").value,
                    receive_updates: document.getElementById("receive-updates").checked,
                    dark_mode: darkModeSwitch.checked
                };

                try {
                    const res = await fetch("http://localhost:5000/api/settings", {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(updatedSettings)
                    });

                    if (res.ok) {
                        alert("✅ Settings saved successfully!");
                        window.location.href = "Dashboard.html";
                    } else {
                        alert("❌ Failed to save settings.");
                    }
                } catch (err) {
                    console.error("Save error:", err);
                    alert("⚠️ Error connecting to backend.");
                }
            });
        });
    </script>
</body>

</html>
