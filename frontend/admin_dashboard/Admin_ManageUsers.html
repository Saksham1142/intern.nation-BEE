<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Users | intern.nation Admin</title>

<link rel="stylesheet" href="../css/Admin_ManageUsers.css">

<link rel="icon" type="jpeg"
href="https://github.com/prbhleeen/intern.nation/blob/main/assets/logo.jpeg?raw=true">

</head>

<body>

<header>

<img src="https://github.com/prbhleeen/intern.nation/blob/main/assets/logo.jpeg?raw=true">

<h1>intern.nation - Manage Users</h1>

</header>


<div class="dashboard-container">

<aside class="sidebar">

<ul>

<li><a href="Admin_Dashboard.html">🏠 Dashboard</a></li>
<li><a href="Admin_Statistics.html">📊 View All Statistics</a></li>
<li><a href="Admin_ManageUsers.html">👥 Manage Users</a></li>
<li><a href="Admin_ManageCompanies.html">🏢 Manage Companies</a></li>
<li><a href="Admin_ViewSchedules.html">📅 View Schedules</a></li>
<li><a href="Admin_Settings.html">⚙ System Settings</a></li>

</ul>

</aside>


<main class="main-content">

<section id="users">

<h2>Manage All Users</h2>

<div class="table-container">

<table class="users-table">

<thead>

<tr>
<th>ID</th>
<th>User Name</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
<th>View</th>
</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

</section>

</main>

</div>


<footer>

© 2025 intern.nation | All Rights Reserved

</footer>


<script>

/* =========================
LOAD USERS
========================= */

async function loadUsers(){

try{

const res = await fetch("http://localhost:5000/api/data");
const data = await res.json();

const students = data.students || [];
const table = document.getElementById("usersTable");

table.innerHTML="";

students.forEach(user=>{

const status = user.status || "pending";

let badge="pending";
if(status==="approved") badge="active";
if(status==="rejected") badge="rejected";

const disabled = status !== "pending" ? "disabled" : "";

table.innerHTML +=`

<tr>

<td>${user.id}</td>
<td>${user.name}</td>
<td>${user.email}</td>

<td>
<span class="badge ${badge}">
${status.toUpperCase()}
</span>
</td>

<td>

<button 
class="action-button approve"
onclick="updateStatus(${user.id},'approved')" 
${disabled}>
Approve
</button>

<button 
class="action-button reject"
onclick="updateStatus(${user.id},'rejected')" 
${disabled}>
Reject
</button>

</td>

<td>

<button 
class="action-button view"
onclick="viewUser(${user.id})">
View
</button>

</td>

</tr>
`;

});

}

catch(error){

console.error("Error loading users:",error);

}

}


/* =========================
UPDATE STATUS
========================= */

async function updateStatus(id,status){

try{

await fetch("http://localhost:5000/api/update-status",{

method:"PATCH",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
entity:"student",
id:id,
status:status
})

});

alert("Status Updated");

loadUsers();

}

catch(error){

console.error("Error updating status:",error);

}

}


/* =========================
VIEW USER DETAILS
========================= */

function viewUser(id){

window.location.href=`Admin_viewdetails.html?id=${id}`;

}


/* =========================
INITIAL LOAD
========================= */

loadUsers();

</script>

</body>

</html>
